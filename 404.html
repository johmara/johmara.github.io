<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Johan Martinson</title>
  <script>
    // Single Page Apps for GitHub Pages
    // Redirects all 404s back to index.html with the path encoded as a query param
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
