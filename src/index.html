  <script>
    // Restore path encoded by 404.html redirect (GitHub Pages SPA routing)
    (function() {
      var p = new URLSearchParams(window.location.search).get('p');
      if (p) {
        window.history.replaceState(null, '', p);
      }
    })();
  </script>
